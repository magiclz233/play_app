server:
  port: 8080

spring:
  profiles:
    active: dev_1
  application:
    name: play-app-backend

  # 文件上传配置
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

  # Flyway 由 FlywayConfig.java 手动管理（Spring Boot 4 无自动配置）

# 日志配置
logging:
  file:
    path: logs
  level:
    com.playapp: DEBUG
    com.playapp.mapper: TRACE
    com.baomidou.mybatisplus: DEBUG
    org.springframework.web: DEBUG
    org.springframework.security: DEBUG

# MyBatis-Plus 配置
mybatis-plus:
  mapper-locations: classpath*:mapper/*.xml
  type-aliases-package: com.playapp.entity
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

# 平台业务配置
app:
  platform:
    fee-rate: 0.05        # 平台抽成比例 5%
    fee-min: 5.00         # 最低平台费
    fee-max: 50.00        # 最高平台费封顶
  order:
    pay-timeout-minutes: 15  # 订单支付超时时间（分钟）

# 微信集成配置 (基于 WxJava)
wx:
  miniapp:
    appid: wx39ba2ce2e8ff43a0
    secret: 57c20fcd1a6ff90ce8626bdfc6d39c7a
    configs:
      - appid: ${wx.miniapp.appid}
        secret: ${wx.miniapp.secret}
  pay:
    appId: ${wx.miniapp.appid}
    mchId: wx_placeholder_mch_id
    mchKey: wx_placeholder_mch_key
    keyPath: classpath:cert/apiclient_key.pem
