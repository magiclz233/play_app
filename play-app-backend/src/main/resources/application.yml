server:
  port: 8080

spring:
  profiles:
    active: dev_1
  application:
    name: play-app-backend

  # 文件上传配置
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

  # Flyway 数据库迁移
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 1

# 日志配置
logging:
  file:
    path: logs
  level:
    com.playapp: DEBUG
    com.playapp.mapper: TRACE
    com.baomidou.mybatisplus: DEBUG
    org.springframework.web: DEBUG
    org.springframework.security: DEBUG

# MyBatis-Plus 配置
mybatis-plus:
  mapper-locations: classpath*:mapper/*.xml
  type-aliases-package: com.playapp.entity
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

# 微信集成配置 (基于 WxJava)
wx:
  miniapp:
    appid: wx_placeholder_appid
    secret: wx_placeholder_secret
    configs:
      - appid: ${wx.miniapp.appid}
        secret: ${wx.miniapp.secret}
  pay:
    appId: ${wx.miniapp.appid}
    mchId: wx_placeholder_mch_id
    mchKey: wx_placeholder_mch_key
    keyPath: classpath:cert/apiclient_key.pem
